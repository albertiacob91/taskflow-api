services:
  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5433:5432"
    volumes:
      - taskflow_db:/var/lib/postgresql/data

volumes:
  taskflow_db: